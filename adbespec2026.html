                            <div class="bg-white/10 rounded-lg p-3 border border-white/20 backdrop-blur-sm"><div class="text-xs text-white/70 mb-1 flex items-center gap-1"><i data-lucide="layers" class="w-3 h-3"></i> 記憶體 RAM</div><div class="font-bold text-lg">${summary.ram}</div><div class="text-[10px] text-white/60">${level === 'flagship' ? 'AE/PR 建議' : 'PS/AI 足夠'}</div></div>
                            <div class="bg-white/10 rounded-lg p-3 border border-white/20 backdrop-blur-sm"><div class="text-xs text-white/70 mb-1 flex items-center gap-1"><i data-lucide="monitor" class="w-3 h-3"></i> 顯示卡 GPU</div><div class="font-bold text-lg">${summary.gpu}</div><div class="text-[10px] text-white/60">${level === 'flagship' ? '支援硬體加速' : '基本顯示'}</div></div>
                        </div>
                    </div>
                </div>
            ` : '';

            // 3. Tables Rendering Helper
            const renderTable = (title, iconName, apps, colorClass) => {
                if (!apps || apps.length === 0) return '';
                const isDesktopOrSub = title.includes("Desktop") || title.includes("Substance") || title.includes("特殊");
                
                const rows = apps.map(app => {

                    const platforms = [];
                    if (app.has_web) platforms.push(`<span class="text-[10px] font-bold bg-sky-100 text-sky-700 px-1.5 py-0.5 rounded border border-sky-200">Web</span>`);

                return `

        function closeModal() {

        // --- INTERACTION ---

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar-container');
            const overlay = document.getElementById('mobile-overlay');
            const isOpen = !sidebar.classList.contains('-translate-x-full');
            
            if (isOpen) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');

                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');

            state.activeLicId = id;
            state.tenderLevel = 'flagship'; // reset default

            const sidebar = document.getElementById('sidebar-container');
            if (!sidebar.classList.contains('-translate-x-full') && window.innerWidth < 1024) {
                toggleSidebar();
            }
            renderSidebar();
            renderMainContent();

            state.tenderLevel = level;
            renderMainContent();

            state.isAuditMode = !state.isAuditMode;
            renderMainContent();
        }

        function getTenderText() {
            const lic = getActiveLic();

            const level = state.tenderLevel;

                let platforms = [];

                if (a.has_ios) platforms.push('iOS');
                if (a.has_android) platforms.push('Android');
                return `${a.name} [${platforms.join('/')}]`;
            }).join('\n   - ');
            const eolAppsList = apps.filter(a => a.category === 'eol').map(a => `${a.name}: ${a.alert}`).join('\n   - ');

            let text = `【Adobe CC 2026 (v26) 硬體採購規格書 - ${lic.name}】\n採購等級：${level === 'flagship' ? '全套旗艦規格' : level === 'essential' ? '基礎平面規格' : 'Substance 3D 專用'}\n資料來源：Adobe 官方網站 (HelpX) - 2025/2026 Release\n\n【資安風險聲明 (Security Advisory)】\n微軟將於 2025 年 10 月 14 日終止 Windows 10 支援。\n為資安合規，強烈建議採購 Windows 11。\n參考連結：https://support.microsoft.com/zh-tw/windows/windows-10-%E6%94%AF%E6%8F%B4%E5%B7%B2%E6%96%BC-2025-%E5%B9%B4-10-%E6%9C%88-14-%E6%97%A5%E7%B5%90%E6%9D%9F-2ca8b313-1946-43d3-b55c-2b95b107f281\n\n【硬體規格總結】\n● 作業系統：Windows 11 (建議) / Windows 10 22H2 (最低)\n● 處理器 (CPU)：${summary?.cpu || '-'} ${level === 'essential' ? '' : '(需支援 AVX2 指令集)'}\n● 記憶體 (RAM)：${summary?.ram || '-'}\n● 顯示卡 (GPU)：${summary?.gpu || '-'}\n\n=== 軟體授權清單 (桌面端) ===\n本案採購包含 Adobe Creative Cloud 全套授權，桌面軟體清單如下：\n   - ${desktopAppsList}\n`;

            if (substanceAppsList.length > 0) text += `\n=== 教育版專屬權益 (不包含Substance 3D Assets) ===\n本授權方案包含以下 3D 創作軟體：\n   - ${substanceAppsList}\n`;
            
            text += `\n=== 特別註記軟體 (不列入規格計算) ===\n以下軟體雖包含於授權中 (部分例外)，但因狀態特殊，不列入硬體效能評估：\n   - ${eolAppsList}\n`;
            
            if (!isRestricted) {
                text += `\n=== 行動裝置應用程式 (Mobile Apps) 與 網頁服務 ===\n包含以下項目 (需具備 Adobe ID 登入權限)：\n   - ${mobileAppsList}\n`;
            } else {
                text += `\n★ 排除項目宣告 (SDL/FRL 限制):\n- 本案採購之授權為【${lic.name}】，不包含行動裝置 App 與雲端服務。\n`;
            }
            return text;
        }

        function handleCopy() {
            const text = getTenderText();
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                state.copyFeedback = true;
                renderMainContent();
                setTimeout(() => {
                    state.copyFeedback = false;
                    renderMainContent(); // re-render to reset button
                }, 2000);
            } catch (err) {
                console.error(err);
            }
            document.body.removeChild(textArea);
        }

        function handleDownload() {
            const lic = getActiveLic();
            const text = getTenderText();
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Adobe_Spec_${lic.short}_${state.tenderLevel}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // --- INIT ---
        window.onload = function() {
            renderSidebar();
            renderMainContent();
        };

    </script>
</body>
</html>
